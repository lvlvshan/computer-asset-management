name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
  DOCKER_IMAGE: lvlvshan/computer-asset-management

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 明确安装所有架构的 QEMU binfmt 注册
      - name: Set up QEMU (all arches)
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set platform tag
        id: platform
        run: |
          tag="${{ matrix.platform }}"
          echo "tag=${tag//\//-}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY_IMAGE }}:${{ steps.platform.outputs.tag }}
          provenance: false
          sbom: false

  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - build

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (optional)
        id: dockerhub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_IMAGE }}
            ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create multi-arch manifest on GHCR
        run: |
          cmd="docker buildx imagetools create"
          while IFS= read -r tag; do
            [ -n "$tag" ] && cmd="$cmd -t $tag"
          done <<< "$(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          cmd="$cmd ${{ env.REGISTRY_IMAGE }}:linux-amd64"
          cmd="$cmd ${{ env.REGISTRY_IMAGE }}:linux-arm64"
          cmd="$cmd ${{ env.REGISTRY_IMAGE }}:linux-arm-v7"
          echo "Running: $cmd"
          eval "$cmd"

      - name: Push to Docker Hub (optional)
        if: steps.dockerhub.outcome == 'success'
        run: |
          cmd="docker buildx imagetools create"
          while IFS= read -r tag; do
            [ -n "$tag" ] && cmd="$cmd -t $tag"
          done <<< "$(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          cmd="$cmd ${{ env.REGISTRY_IMAGE }}:linux-amd64"
          cmd="$cmd ${{ env.REGISTRY_IMAGE }}:linux-arm64"
          cmd="$cmd ${{ env.REGISTRY_IMAGE }}:linux-arm-v7"
          eval "$cmd"

  export:
    name: Export image artifact
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - merge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and save
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}

      - name: Compress
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }} | gzip > /tmp/computer-asset-management-${{ github.ref_name }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: computer-asset-management-${{ github.ref_name }}
          path: /tmp/computer-asset-management-${{ github.ref_name }}.tar.gz
          retention-days: 7
