name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
  DOCKER_IMAGE: lvlvshan/computer-asset-management

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (all arches)
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set platform tag
        id: platform
        run: |
          tag="${{ matrix.platform }}"
          echo "tag=${tag//\//-}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.platform }})
        id: build
        continue-on-error: true
        env:
          TAG: ${{ steps.platform.outputs.tag }}
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --tag ${{ env.REGISTRY_IMAGE }}:$TAG \
            --provenance=false \
            --sbom=false \
            --push \
            . 2>&1 | tee /tmp/docker-build-$TAG.log
          exit_code=$?
          echo "EXIT_CODE=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code

      - name: Show error log on failure
        if: steps.build.outcome == 'failure'
        run: |
          echo "::group::Docker build error log"
          tail -100 /tmp/docker-build-${{ steps.platform.outputs.tag }}.log
          echo "::endgroup::"
          exit 1

  manifest:
    name: Push multi-arch manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
      - build
    if: always()

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build ALL platforms together in one pass to produce a multi-arch manifest
      - name: Create multi-arch manifest
        run: |
          echo "=== Building multi-arch manifest ==="
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            --tag ${{ env.REGISTRY_IMAGE }}:latest \
            --provenance=false \
            --sbom=false \
            --push \
            . 2>&1 | head -50

      - name: Log in to Docker Hub (optional)
        id: dockerhub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub (optional)
        if: steps.dockerhub.outcome == 'success'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            --tag ${{ env.DOCKER_IMAGE }}:latest \
            --provenance=false \
            --sbom=false \
            --push \
            . 2>&1 | head -50
