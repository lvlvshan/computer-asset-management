name: Docker Build (x86_64)

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: computer-asset-management:${{ github.ref_name }}

      - name: Export image to tar
        run: |
          docker save computer-asset-management:${{ github.ref_name }} | gzip > /tmp/computer-asset-management-${{ github.ref_name }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: computer-asset-management-${{ github.ref_name }}
          path: /tmp/computer-asset-management-${{ github.ref_name }}.tar.gz
          retention-days: 7
